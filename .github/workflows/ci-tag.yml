name: CI - Tag Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  ci:
    uses: ./.github/workflows/reusable-ci.yml

  build_tauri:
    needs: ci
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux
            os: ubuntu-22.04
            artifact_name: tauri-linux
            artifact_paths: |
              Gui/sp-gui/src-tauri/target/release/bundle/**/*.AppImage
              Gui/sp-gui/src-tauri/target/release/bundle/**/*.deb
              Gui/sp-gui/src-tauri/target/release/bundle/**/*.rpm
          - name: windows
            os: windows-2022
            artifact_name: tauri-windows
            artifact_paths: |
              Gui/sp-gui/src-tauri/target/release/bundle/**/*.exe
              Gui/sp-gui/src-tauri/target/release/bundle/**/*.msi
          - name: macos
            os: macos-14
            artifact_name: tauri-macos
            artifact_paths: |
              Gui/sp-gui/src-tauri/target/release/bundle/**/*.dmg
    runs-on: ${{ matrix.os }}
    name: Build Tauri (${{ matrix.name }})
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          check-latest: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential curl file libayatana-appindicator3-dev librsvg2-dev libssl-dev libwebkit2gtk-4.1-dev libxdo-dev patchelf wget

      - name: Install Angular dependencies
        working-directory: ./Gui/sp-gui-angular
        run: pnpm install --frozen-lockfile

      - name: Install Tauri dependencies
        working-directory: ./Gui/sp-gui
        run: pnpm install --frozen-lockfile

      - name: Build preprequistes
        working-directory: ./CoreJS
        run: pnpm build

      - name: Build Tauri desktop app
        working-directory: ./Gui/sp-gui
        run: pnpm tauri build

      - name: Upload Tauri bundles
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_paths }}
          if-no-files-found: error

  deploy_production:
    needs: ci
    runs-on: ubuntu-22.04
    name: Deploy to Production
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Download web deploy artifact
        uses: actions/download-artifact@v4
        with:
          name: web-deploy
          path: ./deploy/web

      - name: Download api deploy artifact
        uses: actions/download-artifact@v4
        with:
          name: api-deploy
          path: ./deploy/api

      - name: Deploy to Azure Static Web Apps (Production)
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_ORANGE_SEA_080BC3503 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "/deploy/web"
          api_location: "/deploy/api"
          output_location: ""
          skip_app_build: true
          skip_api_build: true

  create_release_notes:
    needs: deploy_production
    runs-on: ubuntu-22.04
    name: Create/Update Release Notes
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get tag version
        id: tag_version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create or Update Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NEW_LINE="Live at: https://orange-sea-080bc3503.azurestaticapps.net/"
          TAURI_ASSETS="Tauri desktop assets attached to this release:\n- Linux AppImage\n- Linux Debian package (.deb)\n- Linux RPM package (.rpm)\n- Windows installer (.exe)\n- Windows installer (.msi)\n- macOS bundle (.dmg)"
          
          # Check if release exists
          if gh release view "${{ steps.tag_version.outputs.version }}" &>/dev/null; then
            # Release exists - get current body and append new line
            CURRENT_BODY=$(gh release view "${{ steps.tag_version.outputs.version }}" --json body -q .body)
            UPDATED_BODY="$CURRENT_BODY

          $NEW_LINE

          $TAURI_ASSETS"
            gh release edit "${{ steps.tag_version.outputs.version }}" --notes "$UPDATED_BODY"
          else
            # Release doesn't exist - create new one
            RELEASE_BODY="Release ${{ steps.tag_version.outputs.version }}

          $NEW_LINE

          $TAURI_ASSETS"
            gh release create "${{ steps.tag_version.outputs.version }}" --title "Release ${{ steps.tag_version.outputs.version }}" --notes "$RELEASE_BODY" --draft=false
          fi

  upload_tauri_assets:
    needs:
      - build_tauri
      - create_release_notes
    runs-on: ubuntu-22.04
    name: Upload Tauri Release Assets
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Tauri artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: tauri-*
          merge-multiple: true
          path: ./release-assets

      - name: Get tag version
        id: tag_version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Upload assets to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! find ./release-assets -type f | grep -q .; then
            echo "No Tauri assets found in ./release-assets" >&2
            exit 1
          fi
          find ./release-assets -type f -print0 | while IFS= read -r -d '' asset; do
            gh release upload "${{ steps.tag_version.outputs.version }}" "$asset" --clobber --repo "${{ github.repository }}"
          done

      - name: Update release notes with asset links
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          TAG_VERSION: ${{ steps.tag_version.outputs.version }}
        run: |
          current_body=$(gh release view "${{ steps.tag_version.outputs.version }}" --json body -q .body)
          CURRENT_BODY="$current_body" python3 - <<'PY'
          import os
          import re
          import json
          import subprocess

          def asset_label(name: str) -> str:
            lower = name.lower()
            if lower.endswith(".appimage"):
              return "Linux AppImage"
            if lower.endswith(".deb"):
              return "Linux Debian package (.deb)"
            if lower.endswith(".rpm"):
              return "Linux RPM package (.rpm)"
            if lower.endswith(".exe"):
              return "Windows installer (.exe)"
            if lower.endswith(".msi"):
              return "Windows installer (.msi)"
            if lower.endswith(".dmg"):
              return "macOS disk image (.dmg)"
            return name

          release_json = subprocess.run(
            [
              "gh",
              "api",
                f"repos/{os.environ['GITHUB_REPOSITORY']}/releases/tags/{os.environ['TAG_VERSION']}",
            ],
            capture_output=True,
            text=True,
            check=True,
          ).stdout
          assets = json.loads(release_json).get("assets", [])
          asset_lines = "\n".join(
            f"- [{asset_label(asset['name'])}]({asset['browser_download_url']})"
            for asset in assets
          )

          body = os.environ["CURRENT_BODY"]
          replacement = "Tauri desktop assets attached to this release:\n"
          if asset_lines:
              replacement += asset_lines + "\n"

          updated_body = re.sub(
              r"\nTauri desktop assets attached to this release:\n.*\Z",
              "\n" + replacement,
              body,
              flags=re.S,
          )
          if updated_body == body:
              updated_body = body.rstrip() + "\n\n" + replacement

          subprocess.run(
              [
                  "gh",
                  "release",
                  "edit",
                  "${{ steps.tag_version.outputs.version }}",
                  "--notes-file",
                  "-",
                  "--repo",
                  "${{ github.repository }}",
              ],
              input=updated_body,
              text=True,
              check=True,
          )
          PY
